[project]
name = "atlas-env-helpdesk"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = ["atlas-core", "atlas-synth"]

[tool.uv.sources]
atlas-core = { workspace = true }
atlas-synth = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/atlas_env_helpdesk"]
