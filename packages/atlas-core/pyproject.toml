[project]
name = "atlas-core"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = ["pydantic>=2.9.0", "psycopg[binary]>=3.2.0"]

[project.scripts]
atlas-db = "atlas_core.db:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/atlas_core"]
